<svg width="500" height="150" viewBox="0 0 500 150" xmlns="http://w3.org">
  <style>
    .text-main { fill: #ffffff; font-family: sans-serif; font-weight: 900; font-size: 45px; }
    .glitch { font-family: sans-serif; font-weight: 900; font-size: 45px; opacity: 0.6; }
    .enc { fill: #00ffcc; font-family: monospace; font-size: 12px; letter-spacing: 10px; }
    
    @keyframes blink { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }
    @keyframes move { 0% { transform: translate(0); } 20% { transform: translate(-2px, 2px); } 40% { transform: translate(-2px, -2px); } 60% { transform: translate(2px, 2px); } 80% { transform: translate(2px, -2px); } 100% { transform: translate(0); } }
    
    .bolt { animation: blink 0.2s infinite; stroke: #fff; stroke-width: 2; fill: none; }
    .g1 { fill: #ff0055; animation: move 0.2s infinite; }
    .g2 { fill: #00eeff; animation: move 0.3s infinite reverse; }
  </style>

  <rect width="100%" height="100%" fill="none" />

  <path class="bolt" d="M120,40 L130,20 L125,30 L135,10" />
  <path class="bolt" d="M370,90 L380,70 L375,80 L385,60" style="animation-delay: 0.1s;" />

  <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" class="glitch g1">./byxnation</text>
  <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" class="glitch g2">./byxnation</text>
  
  <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" class="text-main">./byxnation</text>

  <text x="50%" y="80%" dominant-baseline="middle" text-anchor="middle" class="enc">Encrypted ;</text>
</svg>
