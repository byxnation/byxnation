<svg width="600" height="200" viewBox="0 0 600 200" xmlns="http://w3.org">
  <rect width="100%" height="100%" fill="none" />

  <style>
    .base-text { fill: white; font-family: 'Segoe UI', Tahoma, sans-serif; font-weight: bold; font-size: 50px; }
    .glitch-text { font-family: 'Segoe UI', Tahoma, sans-serif; font-weight: bold; font-size: 50px; opacity: 0.7; }
    .lightning { stroke: #00ffff; stroke-width: 2; fill: none; opacity: 0; }
  </style>

  <path class="lightning" d="M180,60 L195,40 L185,50 L200,30">
    <animate attributeName="opacity" values="0;1;0;0;1;0" dur="0.8s" repeatCount="indefinite" />
  </path>
  <path class="lightning" d="M410,110 L425,90 L415,100 L430,80">
    <animate attributeName="opacity" values="0;0;1;0;1;0" dur="1.2s" repeatCount="indefinite" />
  </path>

  <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" class="glitch-text" fill="#ff00c1">
    XNATION || 21
    <animate attributeName="x" values="50%;49%;51%;50%" dur="0.1s" repeatCount="indefinite" />
  </text>
  
  <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" class="glitch-text" fill="#00fff9">
    XNATION || 21
    <animate attributeName="x" values="50%;51%;49%;50%" dur="0.15s" repeatCount="indefinite" />
  </text>

  <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" class="base-text">
    .byxnation
  </text>

  <text x="50%" y="80%" dominant-baseline="middle" text-anchor="middle" fill="#555" font-family="monospace" font-size="14" style="letter-spacing: 10px;">
    Encrypted
    <animate attributeName="opacity" values="1;0.2;1" dur="2s" repeatCount="indefinite" />
  </text>
</svg>
